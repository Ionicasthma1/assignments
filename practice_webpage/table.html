<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
table {
  font-family: arial, sans-serif;
  border-collapse: collapse;
  width: 100%;
}

td, th {
  border: 1px solid #dddddd;
  text-align: left;
  padding: 8px;
}

tr:nth-child(even) {
  background-color: #dddddd;
}
</style>
</head>
<body>
    <table>
        <tr>
            <th>heading one</th>
            <th>heading two</th>
            <th>heading three</th>
        </tr>
        <tr>
            <td>data one</td>
            <td>data two</td>
            <td>data three</td>
        </tr>
        <tr>
            <td>data one</td>
            <td>data two</td>
            <td>data three</td>
        </tr>
        </table>
</body>
</html>
